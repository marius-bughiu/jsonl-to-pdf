name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x bundled.
          # IMPORTANT: do NOT pass `registry-url` here. It makes setup-node
          # write a .npmrc with `_authToken=${NODE_AUTH_TOKEN}`, and once
          # an _authToken is configured for the registry, npm CLI treats
          # static auth as "configured" and skips the Trusted Publishing
          # OIDC path entirely — even if NODE_AUTH_TOKEN is empty.
          node-version: 24
          cache: npm
      # Node 24 ships with npm 11.0.x; full Trusted Publishing (OIDC for
      # PUT auth, not just provenance signing) needs npm 11.5.1+. Upgrade
      # before publish. This works on Node 24's clean toolcache where it
      # didn't on Node 22's corrupted one.
      - run: npm install -g npm@latest --force
      - run: npm --version
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Pre-publish diagnostics
        run: |
          echo "::group::npm + node versions"
          which node && node --version
          which npm  && npm --version
          echo "::endgroup::"
          echo "::group::OIDC env vars"
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "ACTIONS_ID_TOKEN_REQUEST_URL is SET"
          else
            echo "ACTIONS_ID_TOKEN_REQUEST_URL is MISSING"
          fi
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN is SET (value redacted by GitHub)"
          else
            echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN is MISSING"
          fi
          echo "::endgroup::"
          echo "::group::npm config"
          echo "registry: $(npm config get registry)"
          echo "userconfig: $(npm config get userconfig)"
          echo "always-auth: $(npm config get always-auth 2>/dev/null || echo unset)"
          echo "::endgroup::"
          echo "::group::.npmrc contents (npm tokens auto-redacted by GitHub)"
          cat "$(npm config get userconfig)" 2>/dev/null || echo "no userconfig"
          echo "::endgroup::"
      - name: Publish to npm via Trusted Publishing
        env:
          # Belt-and-braces: force any leaked static token to empty so npm
          # CLI doesn't try to authenticate with it. The real fix is the
          # missing `registry-url` on setup-node (no _authToken line in
          # .npmrc), but we keep this empty override to neutralise any
          # stale NPM_TOKEN secret still leaking in from the npm-publish
          # environment's secret store.
          NODE_AUTH_TOKEN: ""
        run: npm publish --provenance --access public

  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
            outfile: jsonl-to-pdf-linux-x64
          - target: linux-arm64
            runner: ubuntu-latest
            outfile: jsonl-to-pdf-linux-arm64
          - target: darwin-x64
            runner: macos-13
            outfile: jsonl-to-pdf-darwin-x64
          - target: darwin-arm64
            runner: macos-latest
            outfile: jsonl-to-pdf-darwin-arm64
          - target: win-x64
            runner: windows-latest
            outfile: jsonl-to-pdf-win-x64.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile || bun install
      - name: Compile
        shell: bash
        run: |
          bun build --compile --target=bun-${{ matrix.target }} \
            ./src/cli.ts --outfile dist/${{ matrix.outfile }}
      - name: SHA256
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            certutil -hashfile "${{ matrix.outfile }}" SHA256 | sed -n '2p' | tr -d ' \r' > "${{ matrix.outfile }}.sha256"
          else
            shasum -a 256 "${{ matrix.outfile }}" > "${{ matrix.outfile }}.sha256"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.outfile }}
          path: |
            dist/${{ matrix.outfile }}
            dist/${{ matrix.outfile }}.sha256

  release:
    needs: [build-binaries]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage binaries
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'jsonl-to-pdf-*' -o -name '*.sha256' \) -exec cp {} release/ \;
          (cd release && cat *.sha256 > SHA256SUMS && rm -f *.sha256) || true
          ls -la release
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/jsonl-to-pdf-*
            release/SHA256SUMS
          generate_release_notes: true
